composite_cbf:
    ros__parameters:
        epsilon: 0.22 #0.3
        gain: 3.0
        power: 0.8
        sigma: 0.3
        kappa: 100.0 #80.0
        gamma: 40.0
        alpha: 4.0
        lp_gain_in: 0.8 #0.4
        lp_gain_out: 0.8 # 0.2
        max_acc_xy: 3.0
        max_acc_z: 2.0
        output_frame_viz: rmf_unipilot/base_link
        ctrl_freq: 50.0
        obs_to: 1.0  # obstacle timeout [sec]
        cmd_to: 1.0  # command timeout [sec]
        rho: 0.3 # 0.2

