cbf_pc_selector:
    ros__parameters:
        frame_body: rmf_unipilot/base_link
        sensors:
            1:  # gz lidar
                topic: /rmf_unipilot/lidar/points
                frame: rmf_unipilot/base_link/lidar
                bins_w: 32
                bins_h: 16
                percentile: 20  # [%]
                min_per_bin: 20
                min_range: 0.4  # [m]
                max_range: 10.0  # [m]
                is_pointcloud: true
                is_polar: true
                # input info (since no cam_info is provided for pointcloud inputs)
                azimuth_range: [-180.0, 180.0]  # range of azimuth covered by sensor [deg]
                elevation_range: [0.0, 90.0]  # range of elevation covered by sensor [deg]
                nb_pts: 10000  # probably wrong -- used only for preallocating bin size
