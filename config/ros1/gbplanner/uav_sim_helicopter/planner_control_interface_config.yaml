run_mode: kReal
trigger_mode: kManual
init_motion_enable: false
planner_trigger_lead_time: 0.01
smooth_heading_enable: false
smooth_homing_enable: false
# For flight:
path_end_dist_thr: 2.0
path_end_yaw_thr: 10.2
path_end_dist_scale: 1.0
path_progression_dist_thr: 3.0
path_progression_dist_thr_min: 3.0
path_progression_yaw_thr: 10.4
path_progression_yaw_thr_min: 10.4
path_progression_pitch_thr: 3.14
z_offset_a: 0.0
z_offset_b: 0.0
z_off_t_start: 0
max_mission_time: 0
pub_singple_wp: false
interpolate_traj: true
trajectory_lead_time: 0.0
init_motion:
  z_takeoff: 3.0  # higher takeoff altitude for helicopter
  z_drop: 0.5
  x_forward: 1.75

# Group related parameters to be shared between nodes.
RobotDynamics:
  v_max: 1.5
  v_init_max: 1.0
  v_homing_max: 1.2
  yaw_rate_max: 0.5
  dt: 0.5
  a_max: 0.5
